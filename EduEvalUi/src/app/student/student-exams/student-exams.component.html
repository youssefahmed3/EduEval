<div class="w-full flex flex-col gap-5 justify-around h-full">
  <app-header />
  <h1 class="text-3xl font-bold">Exams</h1>
  <div class="flex gap-2 justify-between flex-wrap">
    @for (exam of exams; track exam.id) {
    <div
      class="bg-primary_navy_blue flex flex-col text-background p-3 rounded-md gap-10 w-full sm:w-[48%] md:w-[32%]"
    >
      <div class="flex items-center justify-between ">
        <div class="flex items-center gap-3">
          <h3 class="text-xl font-bold">
            {{ exam.examTitle }} • {{ exam.duration }} mins
          </h3>
        </div>
        <p>{{ exam.createdAt | date : "EEEE d MMMM y" }}</p>
      </div>
      <div class="flex justify-between items-center">
        <div class="flex flex-col gap-2 items-start">
          <p>{{ exam.examQuestions.length }} Questions</p>
          <span class="badge bg-accent_blue text-background">
            {{ exam.subject.subjectName }}
          </span>
        </div>
        @if(!hasAttended(exam.id)) {
        <app-button buttonText="Take Exam" routerLink="/exam/{{ exam.id }}" />
        }@else {
          <button class="btn bg-primary_navy_blue text-background disabled:text-background" disabled>
            Exam Already Taken
          </button>
        }
      </div>
    </div>
    }
  </div>
</div>
