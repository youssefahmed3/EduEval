<div class="w-full flex flex-col gap-5 justify-between h-full">
  <app-header />
  <div class="flex flex-wrap gap-2 justify-around items-center">
    @for(exam of exams; track exam.id) {
    <div
      class="bg-primary_navy_blue flex flex-col text-background p-2 rounded-md w-[30%] gap-10"
    >
      <div class="flex items-center justify-between">
        <div class="flex items-center gap-3">
          <h3 class="text-xl font-bold">{{ exam.examTitle }}</h3>

          <span class="badge bg-accent_blue text-background">{{
            exam.subject.subjectName
          }}</span>
        </div>
        <p>{{ exam.duration }} mins</p>
      </div>
      <div class="flex justify-between items-center">
        <p>{{ exam.createdAt | date : "EEEE d MMMM y HH:mm" }}</p>
        <app-button buttonText="Show Questions" routerLink="/admin/exams/{{exam.id}}/questions"/>
      </div>
    </div>
    }
  </div>
</div>
